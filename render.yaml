services:
  - type: web
    name: smart-apply-assistant-backend
    env: java
    plan: free
    rootDir: backend
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "./smart-apply-assistant-backend"
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: OPENAI_API_KEY
        sync: false
      - key: SPRING_PROFILES_ACTIVE
        value: prod
