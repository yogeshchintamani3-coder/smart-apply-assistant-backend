services:
  - type: web
    name: smart-apply-assistant-backend
    env: java
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/assistant-0.0.1-SNAPSHOT.jar
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SPRING_PROFILES_ACTIVE
        value: prod
        

